<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Snacc">
<meta name="theme-color" content="#16110d">
<link rel="apple-touch-icon" href="icon-180.png?v=2">
<link rel="icon" type="image/png" href="icon-180.png?v=2">
<title>Snacc</title>
<style>
  :root{
    --bg:#16110d; --bg2:#1f1812; --card:#251c15; --card2:#33291f; --line:#3b2f25;
    --text:#fbf3ec; --muted:#b39d8b; --accent:#ff8a3d; --accent2:#ffb02e;
    --accent-d:#e0721f; --p:#ff6b6b; --c:#ffc14d; --f:#c98bff;
    --teal:#2dd4bf; --blue:#5b9dff; --amber:#ffb02e; --warn:#ff6b6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior:none}
  body{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:28px;position:relative;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  body.locked{position:fixed;left:0;right:0;width:100%;overflow:hidden}
  h1,h2,h3{margin:0;font-weight:700}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;
    touch-action:manipulation;transition:transform .08s ease}
  button:active{transform:scale(.97)}
  input,select,textarea{font-family:inherit;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
  .spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--card2);
    border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading{text-align:center;color:var(--muted);padding:22px;font-size:14px}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 16px;line-height:1.6}

  /* ===== Header / dashboard ===== */
  header{padding:calc(env(safe-area-inset-top) + 18px) 18px 18px;
    background:radial-gradient(130% 95% at 50% -12%, rgba(255,138,61,.28), rgba(255,176,46,.06) 55%, rgba(255,138,61,0) 78%)}
  .date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .logo{width:34px;height:34px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;color:#2a1400;font-weight:900;font-size:20px;
    box-shadow:0 4px 12px rgba(255,138,61,.42)}
  .brand h1{font-size:23px;letter-spacing:-.4px;font-weight:800}
  .hdr-actions{display:flex;align-items:center;gap:10px}
  .hicon{width:34px;height:34px;border-radius:10px;background:var(--card);
    font-size:18px;display:flex;align-items:center;justify-content:center;border:1px solid var(--card2)}
  .date-nav{display:flex;gap:6px;align-items:center}
  .date-nav button{width:34px;height:34px;border-radius:10px;background:var(--card);
    font-size:17px;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .date-nav .dlabel{font-size:13px;color:var(--muted);min-width:74px;text-align:center;font-weight:600}

  .dash{display:flex;gap:20px;align-items:center}
  .ring{position:relative;width:130px;height:130px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-c .big{font-size:33px;font-weight:900;line-height:1;letter-spacing:-1px}
  .ring-c .sub{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  .macros{flex:1;display:flex;flex-direction:column;gap:13px}
  .macro .mtop{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}
  .macro .mtop .mn{color:var(--muted)}
  .macro .mtop .mv{font-weight:600}
  .macro .bar{height:7px;background:var(--card2);border-radius:6px;overflow:hidden}
  .macro .fill{height:100%;border-radius:6px;width:0%;transition:width .35s ease}
  .goal-edit{font-size:12px;color:var(--accent);background:none;padding:2px 0;align-self:flex-start;font-weight:600}

  /* ===== Meals ===== */
  main{padding:6px 14px 0}
  .meal{margin-bottom:11px;background:var(--card);border-radius:22px;overflow:hidden}
  .meal-head{display:flex;align-items:center;gap:10px;padding:14px 15px 12px}
  .meal-head .micon{font-size:18px}
  .meal-head .mtitle{flex:1;font-size:15.5px;font-weight:700}
  .meal-head .msub{font-size:13px;color:var(--muted);font-weight:600}
  .meal-head .madd{width:32px;height:32px;border-radius:12px;position:relative;font-size:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 3px 8px rgba(255,138,61,.35)}
  .meal-head .madd::before,.meal-head .madd::after{content:"";position:absolute;left:50%;top:50%;
    background:#2a1400;border-radius:2px}
  .meal-head .madd::before{width:15px;height:3px;transform:translate(-50%,-50%)}
  .meal-head .madd::after{width:3px;height:15px;transform:translate(-50%,-50%)}
  .entries{padding:0 8px 8px}
  .entry{display:flex;align-items:center;gap:12px;padding:11px 8px;border-top:1px solid var(--line)}
  .entry .info{flex:1;min-width:0}
  .entry .en{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .entry .es{font-size:12px;color:var(--muted);margin-top:2px}
  .entry .ec{font-size:14.5px;font-weight:700;white-space:nowrap}
  .entry .ec small{display:block;font-size:10px;color:var(--muted);font-weight:500;text-align:right}
  .entry .del{width:28px;height:28px;border-radius:8px;background:transparent;color:#5d6475;font-size:15px;
    display:flex;align-items:center;justify-content:center}
  .meal-empty{padding:4px 12px 14px;color:#5d6475;font-size:12.5px}

  /* ===== Floating add button ===== */
  .fab{position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 22px);width:62px;height:62px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#2a1400;font-size:32px;font-weight:300;
    display:flex;align-items:center;justify-content:center;z-index:40;
    box-shadow:0 8px 24px rgba(34,197,94,.45),0 2px 6px rgba(0,0,0,.4);transition:transform .15s}
  .fab:active{transform:translateX(-50%) scale(.92)}

  /* ===== Bottom sheets / modals ===== */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;z-index:51;
    background:var(--bg2);border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.3,.8,.3,1);
    display:flex;flex-direction:column;max-height:90vh}
  .sheet.show{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--card2);margin:10px auto 4px}

  /* Add sheet */
  #addSheet{height:88vh}
  .add-top{padding:6px 16px 12px}
  .add-title{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
    text-align:center;margin-bottom:12px;font-weight:600}
  .add-title b{color:var(--accent)}
  .search-row{display:flex;gap:9px}
  .search-row input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:13px 14px;color:var(--text);font-size:16px;outline:none}
  .search-row input:focus{border-color:var(--accent)}
  .sq-btn{width:48px;border-radius:13px;background:var(--card2);font-size:20px;display:flex;align-items:center;justify-content:center}
  .sq-btn.scan{color:var(--blue)}
  .add-actions{display:flex;gap:9px;margin-top:10px}
  .add-actions button{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:11px;font-size:13.5px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px}
  .add-results{flex:1;overflow-y:auto;padding:4px 14px 24px;-webkit-overflow-scrolling:touch}
  .sec-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 4px 8px;font-weight:600}
  .fcard{background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
  .fcard .fi{flex:1;min-width:0}
  .fcard .fn{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fcard .fs{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fcard .fp{width:30px;height:30px;border-radius:9px;position:relative;font-size:0;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .fcard .fp::before,.fcard .fp::after{content:"";position:absolute;left:50%;top:50%;
    background:#2a1400;border-radius:2px}
  .fcard .fp::before{width:13px;height:2.6px;transform:translate(-50%,-50%)}
  .fcard .fp::after{width:2.6px;height:13px;transform:translate(-50%,-50%)}

  /* Portion + form modal */
  .modal{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;z-index:53;
    background:var(--card);border-radius:24px 24px 0 0;transform:translateY(100%);
    transition:transform .28s cubic-bezier(.3,.8,.3,1);padding:8px 20px calc(env(safe-area-inset-bottom) + 22px);max-height:92vh;overflow-y:auto}
  .modal.show{transform:translateY(0)}
  .modal h3{font-size:18px;margin:6px 0 3px}
  .modal .msub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .nutri-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .nbox{background:var(--card2);border-radius:12px;padding:11px 4px;text-align:center}
  .nbox .nv{font-size:17px;font-weight:700}
  .nbox .nl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .row label{font-size:14px;color:var(--muted);width:80px}
  .row input{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:11px;
    padding:12px;color:var(--text);font-size:16px;outline:none;text-align:center}
  .row input.amt{flex:0 0 90px}
  .row select{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:12px;color:var(--text);font-size:15px;outline:none}
  .row .gg{flex:0 0 56px;text-align:right;font-size:14px;font-weight:700;color:var(--accent)}
  .gtot{text-align:center;font-size:13px;font-weight:600;margin:2px 0 16px}
  .seg{display:flex;gap:6px;margin-bottom:18px}
  .seg button{flex:1;background:var(--card2);color:var(--muted);padding:9px 4px;border-radius:11px;font-size:12.5px;font-weight:600}
  .seg button.on{background:var(--accent);color:#2a1400}
  .m-actions{display:flex;gap:10px}
  .m-actions button{flex:1;padding:14px;border-radius:13px;font-size:15px;font-weight:700}
  .m-actions .cancel{background:var(--card2);color:var(--muted)}
  .m-actions .save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#2a1400}
  .m-actions .star{flex:0 0 52px;background:var(--card2);font-size:20px;color:var(--muted)}
  .m-actions .star.on{color:var(--amber)}
  .m-actions .torch{flex:0 0 auto;padding:14px 18px;background:var(--card2);color:var(--text)}
  .m-actions .torch.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#2a1400}

  #reader{width:100%;border-radius:14px;overflow:hidden;margin:10px 0}
  .toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);background:var(--card2);
    color:var(--text);padding:12px 20px;border-radius:30px;font-size:14px;z-index:90;opacity:0;
    transition:opacity .25s;pointer-events:none;border:1px solid var(--line);max-width:90%;text-align:center}
  .toast.show{opacity:1}
  .ver{text-align:center;color:#4a5160;font-size:11px;padding:10px 0 2px;letter-spacing:.3px}
</style>
</head>
<body>

<header>
  <div class="date-row">
    <div class="brand"><div class="logo">S</div><h1>Snacc</h1></div>
    <div class="hdr-actions">
      <button class="hicon" onclick="openRecipes()" title="Recipes">🍲</button>
      <div class="date-nav">
        <button onclick="changeDay(-1)">‹</button>
        <span class="dlabel" id="dateLabel" onclick="goToday()">Today</span>
        <button onclick="changeDay(1)">›</button>
      </div>
    </div>
  </div>
  <div class="dash">
    <div class="ring">
      <svg width="130" height="130">
        <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ff9f43"/><stop offset="1" stop-color="#ffce54"/></linearGradient></defs>
        <circle cx="65" cy="65" r="56" stroke="var(--card2)" stroke-width="13" fill="none"/>
        <circle id="calRing" cx="65" cy="65" r="56" stroke="url(#rg)" stroke-width="13" fill="none"
          stroke-linecap="round" stroke-dasharray="351.9" stroke-dashoffset="351.9"/>
      </svg>
      <div class="ring-c"><div class="big" id="calLeft">0</div><div class="sub" id="calSub">left</div></div>
    </div>
    <div class="macros">
      <div class="macro"><div class="mtop"><span class="mn">Protein</span><span class="mv" id="pTxt">0 / 0g</span></div>
        <div class="bar"><div class="fill" id="pFill" style="background:var(--p)"></div></div></div>
      <div class="macro"><div class="mtop"><span class="mn">Carbs</span><span class="mv" id="cTxt">0 / 0g</span></div>
        <div class="bar"><div class="fill" id="cFill" style="background:var(--c)"></div></div></div>
      <div class="macro"><div class="mtop"><span class="mn">Fat</span><span class="mv" id="fTxt">0 / 0g</span></div>
        <div class="bar"><div class="fill" id="fFill" style="background:var(--f)"></div></div></div>
      <button class="goal-edit" onclick="editGoals()">Edit goals ›</button>
    </div>
  </div>
</header>

<main id="diary"></main>
<div class="ver" id="ver" onclick="openSettings()"></div>

<!-- Add sheet -->
<div class="scrim" id="addScrim" onclick="closeAdd()"></div>
<div class="sheet" id="addSheet">
  <div class="grab"></div>
  <div class="add-top">
    <div class="add-title">Add to <b id="addMealLabel">Snacks</b></div>
    <div class="search-row">
      <input id="addSearch" type="search" placeholder="Search a food…" oninput="onSearchInput()" autocomplete="off">
      <button class="sq-btn scan" onclick="openScanner()" title="Scan barcode">▣</button>
    </div>
    <div class="add-actions">
      <button onclick="openCustomForm()">＋ Custom</button>
      <button onclick="openQuickAdd()">⚡ Quick cals</button>
      <button onclick="newRecipe()">🍲 Recipe</button>
    </div>
  </div>
  <div class="add-results" id="addResults"></div>
</div>

<!-- Recipes page -->
<div class="scrim" id="recipesScrim" onclick="closeRecipes()"></div>
<div class="sheet" id="recipesSheet">
  <div class="grab"></div>
  <div class="add-top">
    <div class="add-title">Your recipes</div>
    <div class="add-actions"><button onclick="newRecipe()">＋ New recipe</button></div>
  </div>
  <div class="add-results" id="recipesList"></div>
</div>

<!-- Portion / form modal -->
<div class="scrim" id="modalScrim" onclick="closeModal()"></div>
<div class="modal" id="modal"></div>

<!-- Scanner modal -->
<div class="scrim" id="scanScrim" onclick="closeScanner()"></div>
<div class="modal" id="scanModal">
  <div class="grab"></div>
  <h3>Scan barcode</h3>
  <div class="msub">Point your camera at the package barcode</div>
  <div id="reader"></div>
  <div class="m-actions">
    <button class="cancel" onclick="closeScanner()">Close</button>
    <button class="torch" id="torchBtn" onclick="toggleTorch()" style="display:none">🔦 Light</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Hidden camera input for nutrition-label OCR fallback -->
<input id="labelCam" type="file" accept="image/*" capture="environment" style="display:none" onchange="onLabelPhoto(event)">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
/* ===== Storage ===== */
const LS={ get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))} };
let goals=LS.get('ct_goals',{cal:2000,pPct:40,cPct:30,fPct:30,p:200,c:150,f:67});
let saved=LS.get('ct_saved',[]);
let logs =LS.get('ct_logs',{});
let curDate=todayKey();
let pendingFood=null, selectedMeal='Snacks', addMeal='Snacks', editingId=null;
let barcache=LS.get('ct_barcache',{});
let recipes=LS.get('ct_recipes',[]);
let recipeDraft=null, addTarget='log', editIngIdx=null;
const MEALS=['Breakfast','Lunch','Dinner','Snacks'];
const MICON={Breakfast:'🍳',Lunch:'🥗',Dinner:'🍝',Snacks:'🍎'};
const reg={results:[],quick:[]};

let LOCAL_FOODS=[];
fetch('foods.json').then(r=>r.json()).then(d=>{
  LOCAL_FOODS=d.map(x=>({name:x.n,brand:'',cal:x.cal,p:x.p,c:x.c,f:x.f,servingG:x.g||null}));
}).catch(()=>{});

function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayKey(){return dateKey(new Date());}
function saveAll(){LS.set('ct_goals',goals);LS.set('ct_saved',saved);LS.set('ct_logs',logs);LS.set('ct_recipes',recipes);}
function calcMacros(f,g){const r=g/100;return{cal:Math.round(f.cal*r),p:+(f.p*r).toFixed(1),c:+(f.c*r).toFixed(1),f:+(f.f*r).toFixed(1)};}
function gG(cal,pct,k){return Math.round((+cal||0)*(+pct||0)/100/k);}  // grams from % of calories (k=kcal/g)
function normalizeGoals(){ if(goals.pPct==null){const cal=goals.cal||2000;
  goals.pPct=Math.round((goals.p||0)*4/cal*100);goals.cPct=Math.round((goals.c||0)*4/cal*100);
  goals.fPct=Math.round((goals.f||0)*9/cal*100);} }
function fkey(f){return (f.name+'|'+(f.brand||'')).toLowerCase().trim();}
function defaultMeal(){const h=new Date().getHours();return h<11?'Breakfast':h<16?'Lunch':h<21?'Dinner':'Snacks';}

/* ===== Dashboard ===== */
function totalsFor(d){const t={cal:0,p:0,c:0,f:0};(logs[d]||[]).forEach(e=>{t.cal+=e.cal;t.p+=e.p;t.c+=e.c;t.f+=e.f;});
  return{cal:Math.round(t.cal),p:Math.round(t.p),c:Math.round(t.c),f:Math.round(t.f)};}
function renderDashboard(){
  const t=totalsFor(curDate), left=goals.cal-t.cal;
  document.getElementById('calLeft').textContent=Math.abs(left);
  document.getElementById('calSub').textContent=left>=0?'left':'over';
  const C=351.9, pct=Math.min(t.cal/(goals.cal||1),1);
  const ring=document.getElementById('calRing');
  ring.style.strokeDashoffset=C*(1-pct);
  ring.style.stroke=left>=0?'url(#rg)':'var(--warn)';
  setMacro(t.p,goals.p,'pTxt','pFill');
  setMacro(t.c,goals.c,'cTxt','cFill');
  setMacro(t.f,goals.f,'fTxt','fFill');
}
function setMacro(v,goal,tid,fid){document.getElementById(tid).textContent=`${v} / ${goal}g`;
  document.getElementById(fid).style.width=Math.min(v/(goal||1)*100,100)+'%';}

/* ===== Date nav ===== */
function fmtDate(k){if(k===todayKey())return'Today';
  const y=new Date();y.setDate(y.getDate()-1);if(k===dateKey(y))return'Yesterday';
  return new Date(k+'T12:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});}
function changeDay(n){const d=new Date(curDate+'T12:00');d.setDate(d.getDate()+n);curDate=dateKey(d);refresh();}
function goToday(){curDate=todayKey();refresh();}
function refresh(){document.getElementById('dateLabel').textContent=fmtDate(curDate);renderDashboard();renderDiary();}

/* ===== Diary (meal sections) ===== */
function mealOf(e){return MEALS.includes(e.meal)?e.meal:'Snacks';}
function entryAmtLabel(e){
  if(e.quick)return '';
  const b=e.b;
  if(b&&b.ps){const n=+(e.amount/(b.g||100)).toFixed(2),lbl=esc(b.sl||'serving');return (n===1?lbl:n+' × '+lbl)+' · ';}
  return e.amount+' g · ';
}
function renderDiary(){
  const entries=logs[curDate]||[];
  let html='';
  MEALS.forEach(meal=>{
    const es=entries.filter(e=>mealOf(e)===meal);
    const sub=Math.round(es.reduce((s,e)=>s+e.cal,0));
    html+=`<div class="meal"><div class="meal-head">
      <span class="micon">${MICON[meal]}</span><span class="mtitle">${meal}</span>
      <span class="msub">${sub} kcal</span>
      <button class="madd" onclick="openAdd('${meal}')">+</button></div>`;
    if(es.length){
      html+='<div class="entries">'+es.map(e=>`
        <div class="entry"><div class="info" onclick="openEditEntry('${e.id}')">
          <div class="en">${esc(e.name)}</div>
          <div class="es">${entryAmtLabel(e)}${e.p}p ${e.c}c ${e.f}f</div></div>
          <div class="ec">${e.cal}<small>kcal</small></div>
          <button class="del" onclick="removeEntry('${e.id}')">✕</button></div>`).join('')+'</div>';
    } else {
      html+='<div class="meal-empty">Nothing yet — tap ＋ to add</div>';
    }
    html+='</div>';
  });
  document.getElementById('diary').innerHTML=html;
}
function removeEntry(id){logs[curDate]=(logs[curDate]||[]).filter(e=>e.id!==id);saveAll();refresh();toast('Removed');}

/* ===== Add sheet ===== */
function openAdd(meal){
  addTarget='log';editIngIdx=null;
  addMeal=meal||defaultMeal();
  document.getElementById('addMealLabel').textContent=addMeal;
  document.getElementById('addSearch').value='';
  renderQuick();
  showSheet('addScrim','addSheet');
  setTimeout(()=>document.getElementById('addSearch').focus(),250);
}
function closeAdd(){const backToRecipe=addTarget==='recipe'&&recipeDraft;
  hideSheet('addScrim','addSheet');if(backToRecipe)openRecipeBuilder();}

function entryBase(e){if(e.b)return e.b;const a=e.amount||100,r=100/a;
  return{cal:Math.round(e.cal*r),p:+(e.p*r).toFixed(1),c:+(e.c*r).toFixed(1),f:+(e.f*r).toFixed(1),g:a};}
function recentFoods(){
  const out=[],seen=new Set();
  Object.keys(logs).sort().reverse().forEach(d=>{
    const es=logs[d]||[];
    for(let i=es.length-1;i>=0;i--){const e=es[i],k=(e.name+'|'+(e.brand||'')).toLowerCase();
      if(seen.has(k))continue;seen.add(k);const b=entryBase(e);
      out.push({name:e.name,brand:e.brand||'',cal:b.cal,p:b.p,c:b.c,f:b.f,servingG:b.g,sl:b.sl,ps:b.ps});}
  });
  return out.slice(0,15);
}
function freqFoods(){
  const count={},sample={};
  Object.values(logs).forEach(es=>(es||[]).forEach(e=>{
    if(e.quick)return;const k=(e.name+'|'+(e.brand||'')).toLowerCase();
    count[k]=(count[k]||0)+1;
    if(!sample[k]){const b=entryBase(e);sample[k]={name:e.name,brand:e.brand||'',cal:b.cal,p:b.p,c:b.c,f:b.f,servingG:b.g,sl:b.sl,ps:b.ps};}
  }));
  return Object.keys(count).sort((a,b)=>count[b]-count[a]).map(k=>sample[k]);
}
function recipeCard(r){const per=recipePer(r),n=(r.items||[]).length,sg=servG(r);
  const sub=sg>0?`${per.cal} kcal / ${Math.round(sg)} g serving · ${n} ingredient${n===1?'':'s'}`
                :`${per.cal} kcal · ${n} ingredient${n===1?'':'s'}`;
  return `<div class="fcard"><div class="fi" onclick="logRecipe('${r.id}')">
    <div class="fn">🍲 ${esc(r.name)}</div>
    <div class="fs">${sub}</div></div>
    <button class="del" onclick="editRecipe('${r.id}')" title="Edit">✎</button></div>`;}
function renderQuick(){
  const seen=new Set(),list=[];
  saved.concat(freqFoods()).forEach(f=>{const k=fkey(f);if(!seen.has(k)){seen.add(k);list.push(f);}});
  reg.quick=list.slice(0,25);
  const box=document.getElementById('addResults');
  let html='';
  if(addTarget!=='recipe'&&recipes.length)
    html+='<div class="sec-label">Recipes</div>'+recipes.map(recipeCard).join('');
  if(reg.quick.length)
    html+='<div class="sec-label">Saved & frequent</div>'+reg.quick.map((f,i)=>fcard(f,i,'quick')).join('');
  box.innerHTML=html||'<div class="empty">Search a food, scan a barcode,<br>or add a custom food.</div>';
}
function fcard(f,i,which){
  let calDisplay,basis;
  if(f.ps){calDisplay=f.cal;basis=esc(f.sl||'serving');}
  else if(f.servingG){calDisplay=calcMacros(f,f.servingG).cal;basis='serving';}
  else{calDisplay=calcMacros(f,100).cal;basis='100g';}
  return `<div class="fcard" onclick="pick('${which}',${i})"><div class="fi">
    <div class="fn">${esc(f.name)}</div>
    <div class="fs">${f.brand?esc(f.brand)+' · ':''}${calDisplay} kcal / ${basis}</div></div>
    <div class="fp">+</div></div>`;}
function pick(which,i){openPortion({...reg[which][i]});}

/* ===== Search ===== */
let searchSeq=0, searchTimer=null;
function localSearch(q){const t=q.toLowerCase();
  const hits=saved.concat(LOCAL_FOODS).filter(f=>f.name.toLowerCase().includes(t));
  hits.sort((a,b)=>{const aw=a.name.toLowerCase().startsWith(t)?0:1,bw=b.name.toLowerCase().startsWith(t)?0:1;
    return aw-bw||a.name.length-b.name.length;});
  return hits.slice(0,40);}
function onSearchInput(){
  const q=document.getElementById('addSearch').value.trim();
  if(!q){clearTimeout(searchTimer);renderQuick();return;}
  runSearch(q);
}
function runSearch(q){
  const mySeq=++searchSeq, seen=new Set(), acc=[], box=document.getElementById('addResults');
  function add(list){(list||[]).forEach(f=>{const k=fkey(f);if(!seen.has(k)){seen.add(k);acc.push(f);}});reg.results=acc;}
  function render(pending){
    let html=acc.length?acc.map((f,i)=>fcard(f,i,'results')).join(''):'';
    if(pending) html=acc.length?html+'<div class="loading"><span class="spinner"></span> more…</div>':'<div class="loading"><span class="spinner"></span></div>';
    else if(!acc.length) html='<div class="empty">No matches.<br>Tap “＋ Custom food” to add it.</div>';
    box.innerHTML=html;
  }
  add(localSearch(q)); render(true);
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    usdaSearch(q).then(l=>{if(mySeq!==searchSeq)return;add(l);}).catch(()=>{})
      .finally(()=>{if(mySeq===searchSeq)render(false);});
  },400);
}

/* ===== Portion modal ===== */
function openPortion(food,editId,ex){
  pendingFood=food; editingId=editId||null;
  selectedMeal=ex?ex.meal:addMeal;
  const editing=!!editId, ps=!!food.ps, hasServ=!!food.servingG, rmode=addTarget==='recipe';
  let unit,amt;
  if(ps){unit='serv';amt=editing?+(ex.amount/(food.servingG||100)).toFixed(2):1;}
  else if(editing){unit='g';amt=ex.amount;} else if(hasServ){unit='serv';amt=1;} else {unit='g';amt=100;}
  const slClean=(food.sl&&food.sl!=='serving')?food.sl:'';
  const servOpt=ps?('serving'+(slClean?' ('+esc(slClean)+')':'')):('serving ('+(food.sl?esc(food.sl)+', ':'')+food.servingG+' g)');
  const perLabel=ps?('per '+(slClean?esc(slClean):'serving')):'per 100g';
  const isSaved=saved.some(s=>fkey(s)===fkey(food));
  document.getElementById('modal').innerHTML=`
    <div class="grab"></div>
    <h3>${esc(food.name)}</h3>
    <div class="msub">${food.brand?esc(food.brand)+' · ':''}${food.cal} kcal ${perLabel}</div>
    <div class="nutri-grid">
      <div class="nbox"><div class="nv" id="mCal">0</div><div class="nl">kcal</div></div>
      <div class="nbox"><div class="nv" id="mP">0</div><div class="nl">protein</div></div>
      <div class="nbox"><div class="nv" id="mC">0</div><div class="nl">carbs</div></div>
      <div class="nbox"><div class="nv" id="mF">0</div><div class="nl">fat</div></div></div>
    <div class="row">
      <input class="amt" id="amtInput" type="number" inputmode="decimal" value="${amt}" min="${ps?'0.25':'1'}" step="${ps?'0.25':'1'}" oninput="updMacros()">
      <select id="unitSel" onchange="onUnit()">
        ${(hasServ||ps)?`<option value="serv" ${unit==='serv'?'selected':''}>${servOpt}</option>`:''}
        ${ps?'':`<option value="g" ${unit==='g'?'selected':''}>grams</option>`}
      </select></div>
    ${rmode?'':`<div class="seg" id="mealSeg">${MEALS.map(m=>`<button class="${m===selectedMeal?'on':''}" onclick="setMeal('${m}')">${m}</button>`).join('')}</div>`}
    <div class="m-actions">
      ${rmode?'':`<button class="star ${isSaved?'on':''}" id="starBtn" onclick="toggleSave()">★</button>`}
      <button class="cancel" onclick="${rmode?'backToBuilder()':'closeModal()'}">Cancel</button>
      <button class="save" onclick="confirmAdd()">${rmode?(editIngIdx!=null?'Update ingredient':'Add to recipe'):(editing?'Save':'Add')}</button></div>`;
  updMacros();
  showSheet('modalScrim','modal');
}
function backToBuilder(){closeModal();if(recipeDraft)openRecipeBuilder();}
function curGrams(){const v=parseFloat(document.getElementById('amtInput').value)||0;
  return document.getElementById('unitSel').value==='serv'?v*(pendingFood.servingG||100):v;}
function updMacros(){const m=calcMacros(pendingFood,curGrams());
  document.getElementById('mCal').textContent=m.cal;document.getElementById('mP').textContent=m.p;
  document.getElementById('mC').textContent=m.c;document.getElementById('mF').textContent=m.f;}
function onUnit(){document.getElementById('amtInput').value=document.getElementById('unitSel').value==='serv'?1:(pendingFood.servingG||100);updMacros();}
function setMeal(m){selectedMeal=m;[...document.querySelectorAll('#mealSeg button')].forEach(b=>b.classList.toggle('on',b.textContent===m));}
function confirmAdd(){
  const g=curGrams();if(g<=0){toast('Enter an amount');return;}
  const m=calcMacros(pendingFood,g);
  const b={cal:pendingFood.cal,p:pendingFood.p,c:pendingFood.c,f:pendingFood.f,g:pendingFood.servingG||100};
  if(pendingFood.sl)b.sl=pendingFood.sl;
  if(pendingFood.ps)b.ps=true;
  if(addTarget==='recipe'){
    const item={name:pendingFood.name,brand:pendingFood.brand||'',b,
      qty:pendingFood.ps?+(g/(pendingFood.servingG||100)).toFixed(2):Math.round(g),ps:!!pendingFood.ps,sl:pendingFood.sl||''};
    if(editIngIdx!=null&&recipeDraft.items[editIngIdx])recipeDraft.items[editIngIdx]=item;
    else recipeDraft.items.push(item);
    editIngIdx=null;hideSheet('addScrim','addSheet');closeModal();openRecipeBuilder();toast('Ingredient added');return;
  }
  if(editingId){
    const e=(logs[curDate]||[]).find(x=>x.id===editingId);
    if(e){e.meal=selectedMeal;e.amount=Math.round(g);e.cal=m.cal;e.p=m.p;e.c=m.c;e.f=m.f;e.b=b;delete e.quick;}
    saveAll();closeModal();refresh();toast('Updated');return;
  }
  const entry={id:Date.now()+''+Math.random().toString(36).slice(2,6),name:pendingFood.name,brand:pendingFood.brand||'',
    meal:selectedMeal,amount:Math.round(g),cal:m.cal,p:m.p,c:m.c,f:m.f,b};
  (logs[curDate]=logs[curDate]||[]).push(entry);saveAll();
  closeModal();closeAdd();refresh();toast('Added to '+selectedMeal);
}
function toggleSave(){const f=pendingFood,i=saved.findIndex(s=>fkey(s)===fkey(f)),btn=document.getElementById('starBtn');
  if(i>=0){saved.splice(i,1);btn.classList.remove('on');toast('Unsaved');}
  else{saved.unshift({name:f.name,brand:f.brand||'',cal:f.cal,p:f.p,c:f.c,f:f.f,servingG:f.servingG||null});btn.classList.add('on');toast('Saved');}
  saveAll();}
function closeModal(){hideSheet('modalScrim','modal');pendingFood=null;editingId=null;}
function openEditEntry(id){
  const e=(logs[curDate]||[]).find(x=>x.id===id);if(!e)return;
  if(e.quick){openQuickAdd(e);return;}
  const b=entryBase(e);

function saveQuick(){

/* ===== Recipes ===== */
function itemMacros(it){return calcMacros(it.b, it.ps?it.qty*100:it.qty);}
function itemAmtLabel(it){return it.ps?(it.qty+' × '+(it.sl||'serving')):(it.qty+' g');}
function recipeTotals(rec){let t={cal:0,p:0,c:0,f:0};
  (rec.items||[]).forEach(it=>{const m=itemMacros(it);t.cal+=m.cal;t.p+=m.p;t.c+=m.c;t.f+=m.f;});
  return{cal:Math.round(t.cal),p:+t.p.toFixed(1),c:+t.c.toFixed(1),f:+t.f.toFixed(1)};}
function recipeTotalG(rec){return Math.round((rec.items||[]).reduce((s,it)=>s+(it.ps?0:(+it.qty||0)),0));}
function servG(rec){const tg=recipeTotalG(rec);
  if(rec.servingG>0)return rec.servingG;
  if(rec.servings>0&&tg>0)return tg/rec.servings;   // migrate old servings-count recipes
  return tg||0;}                                     // unknown → whole recipe = 1 serving
function recipePer(rec){const t=recipeTotals(rec),tg=recipeTotalG(rec),sg=servG(rec);
  const r=(sg>0&&tg>0)?sg/tg:1;
  return{cal:Math.round(t.cal*r),p:+(t.p*r).toFixed(1),c:+(t.c*r).toFixed(1),f:+(t.f*r).toFixed(1)};}
function newRecipe(){recipeDraft={id:'r'+Date.now()+Math.random().toString(36).slice(2,5),name:'',servingG:null,items:[]};
  closeAdd();openRecipeBuilder();}
function editRecipe(id){const r=recipes.find(x=>x.id===id);if(!r)return;
  recipeDraft=JSON.parse(JSON.stringify(r));closeAdd();openRecipeBuilder();}
function openRecipeBuilder(){
  const r=recipeDraft,t=recipeTotals(r),per=recipePer(r);
  const rows=(r.items||[]).map((it,i)=>{const m=itemMacros(it);
    return `<div class="entry"><div class="info" onclick="editIngredient(${i})">
      <div class="en">${esc(it.name)}</div>
      <div class="es">${esc(itemAmtLabel(it))} · ${m.cal} kcal · ${m.p}p ${m.c}c ${m.f}f</div></div>
      <button class="del" onclick="removeIngredient(${i});event.stopPropagation()">✕</button></div>`;}).join('');
  const isExisting=recipes.some(x=>x.id===r.id);
  document.getElementById('modal').innerHTML=`
    <div class="grab"></div>
    <h3>${isExisting?'Edit recipe':'New recipe'}</h3>
    <div class="msub">List your ingredients and amounts, then set how many grams are in one serving.</div>
    <div class="row"><label>Name</label><input id="rcName" type="text" value="${esc(r.name||'')}" placeholder="e.g. Chili" style="text-align:left" oninput="recipeDraft.name=this.value"></div>
    <div class="sec-label" style="margin-top:6px">Ingredients</div>
    ${rows||'<div class="meal-empty">No ingredients yet — tap ＋ below</div>'}
    <button class="goal-edit" style="margin:8px auto;display:block" onclick="addIngredient()">＋ Add ingredient</button>
    <div class="row"><label>Grams / serving</label><input id="rcServG" type="number" inputmode="decimal" value="${r.servingG||(r.servings>0&&recipeTotalG(r)>0?Math.round(recipeTotalG(r)/r.servings):'')}" placeholder="grams in one serving" oninput="recipeDraft.servingG=parseFloat(this.value)||null;rcRefresh()"></div>
    <div class="nutri-grid">
      <div class="nbox"><div class="nv" id="rcCal">${per.cal}</div><div class="nl">kcal/serv</div></div>
      <div class="nbox"><div class="nv" id="rcP">${per.p}</div><div class="nl">protein</div></div>
      <div class="nbox"><div class="nv" id="rcC">${per.c}</div><div class="nl">carbs</div></div>
      <div class="nbox"><div class="nv" id="rcF">${per.f}</div><div class="nl">fat</div></div></div>
    <div class="gtot" id="rcTot">${rcSummary(r)}</div>
    <div class="m-actions">
      ${isExisting?`<button class="cancel" onclick="deleteRecipe('${r.id}')">Delete</button>`:`<button class="cancel" onclick="closeModal()">Cancel</button>`}
      <button class="save" onclick="saveRecipe()">Save recipe</button></div>`;
  showSheet('modalScrim','modal');
}
function rcSummary(r){const t=recipeTotals(r),tg=recipeTotalG(r),sg=servG(r);
  let s=`Total ${tg} g · ${t.cal} kcal`;
  if(sg>0&&tg>0)s+=` · makes ~${(tg/sg).toFixed(1).replace(/\.0$/,'')} servings`;
  return s;}
function rcRefresh(){const r=recipeDraft,per=recipePer(r);
  document.getElementById('rcCal').textContent=per.cal;
  document.getElementById('rcP').textContent=per.p;
  document.getElementById('rcC').textContent=per.c;
  document.getElementById('rcF').textContent=per.f;
  document.getElementById('rcTot').textContent=rcSummary(r);}
function addIngredient(){addTarget='recipe';editIngIdx=null;closeModal();
  document.getElementById('addMealLabel').textContent='recipe';
  document.getElementById('addSearch').value='';renderQuick();
  showSheet('addScrim','addSheet');
  setTimeout(()=>document.getElementById('addSearch').focus(),250);}
function editIngredient(i){const it=recipeDraft.items[i];if(!it)return;
  addTarget='recipe';editIngIdx=i;closeAdd();
  openPortion({name:it.name,brand:it.brand||'',cal:it.b.cal,p:it.b.p,c:it.b.c,f:it.b.f,servingG:it.b.g,sl:it.b.sl||it.sl,ps:it.ps});}
function removeIngredient(i){recipeDraft.items.splice(i,1);openRecipeBuilder();}
function saveRecipe(){const r=recipeDraft;
  r.name=(document.getElementById('rcName').value||'').trim();
  if(!r.name){toast('Name your recipe');return;}
  if(!r.items.length){toast('Add at least one ingredient');return;}
  r.servingG=parseFloat(document.getElementById('rcServG').value)||null;
  delete r.servings;delete r.totalG;            // drop legacy fields
  const idx=recipes.findIndex(x=>x.id===r.id);
  if(idx>=0)recipes[idx]=r;else recipes.unshift(r);
  saveAll();addTarget='log';recipeDraft=null;closeModal();renderQuick();if(recipesPageOpen())renderRecipesPage();toast('Recipe saved');

    if(e.target.closest('input,select,textarea,button,.add-results'))return;

function b64e(s){return btoa(unescape(encodeURIComponent(s)));}
function b64d(s){return decodeURIComponent(escape(atob(s)));}
function relTime(ts){const s=(Date.now()-ts)/1000;
  if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return new Date(ts).toLocaleDateString();}
function renderVer(){
  const cfg=LS.get('ct_gh',null);let s='Snacc '+APP_VERSION;
  // Status hidden on success; only warn if a backup actually fails.
  if(cfg&&cfg.token&&LS.get('ct_bkfail',0)) s+=' · ⚠ backup failed';
  document.getElementById('ver').textContent=s;
}
async function backupNow(silent){
  const cfg=LS.get('ct_gh',null);if(!cfg||!cfg.token||!cfg.owner||!cfg.repo)return;
  const data=JSON.stringify({goals,saved,logs,barcache,recipes});
  if(silent&&data===LS.get('ct_lastpayload',''))return;        // nothing changed → skip
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/snacc-backup.json`;
  const headers={Authorization:'Bearer '+cfg.token,Accept:'application/vnd.github+json'};
  try{
    let sha;const g=await fetch(url,{headers});if(g.status===200)sha=(await g.json()).sha;
    const body={message:'Snacc backup '+new Date().toISOString(),content:b64e(data)};if(sha)body.sha=sha;
    const p=await fetch(url,{method:'PUT',headers,body:JSON.stringify(body)});
    if(p.ok){LS.set('ct_lastbackup',Date.now());LS.set('ct_lastpayload',data);LS.set('ct_bkfail',0);if(!silent)toast('Backed up ✓');}
    else{LS.set('ct_bkfail',1);if(!silent)toast('Backup failed ('+p.status+')');}
  }catch(e){LS.set('ct_bkfail',1);if(!silent)toast('Backup failed — check connection');}
  renderVer();
}
async function restoreNow(){
  // Read straight from the form fields so restore works on a fresh install
  // WITHOUT saving first (saving would back up empty data over your backup).
  const oEl=document.getElementById('sOwner');
  const cfg=oEl?{owner:oEl.value.trim(),repo:document.getElementById('sRepo').value.trim(),token:document.getElementById('sToken').value.trim()}:LS.get('ct_gh',null);
  if(!cfg||!cfg.owner||!cfg.repo||!cfg.token){toast('Fill in user, repo, and token');return;}
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/snacc-backup.json`;
  try{
    const g=await fetch(url,{headers:{Authorization:'Bearer '+cfg.token,Accept:'application/vnd.github+json'}});
    if(g.status!==200){toast(g.status===404?'No backup found in that repo':'Restore failed ('+g.status+')');return;}
    const data=JSON.parse(b64d((await g.json()).content));
    if(data.goals)goals=data.goals;if(data.saved)saved=data.saved;if(data.logs)logs=data.logs;
    if(data.recipes)recipes=data.recipes;
    if(data.barcache){barcache=data.barcache;LS.set('ct_barcache',barcache);}
    saveAll();normalizeGoals();
    // Save creds for future auto-backups, and mark this exact state as already-backed-up
    // so the auto-backup on next open doesn't redundantly re-push.
    LS.set('ct_gh',{owner:cfg.owner,repo:cfg.repo,token:cfg.token});
    LS.set('ct_lastpayload',JSON.stringify({goals,saved,logs,barcache}));
    LS.set('ct_lastbackup',Date.now());LS.set('ct_bkfail',0);
    closeModal();refresh();toast('Restored ✓');
  }catch(e){toast('Restore failed');}
}

const USDA_KEY='atacxlsNjojlOrTwquGwRvyOcrhRk1MtqLKwvfRa';
function usdaOn(){return USDA_KEY&&USDA_KEY!=='REPLACE_WITH_USDA_KEY';}
async function fetchJSON(url,ms=8000){const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(url,{signal:ctrl.signal});return await r.json();}finally{clearTimeout(t);}}
async function usdaSearch(q){if(!usdaOn())return[];
  const url='https://api.nal.usda.gov/fdc/v1/foods/search?api_key='+USDA_KEY+'&query='+encodeURIComponent(q)+
    '&pageSize=20&dataType=Branded,Foundation,SR%20Legacy,Survey%20(FNDDS)';
  const data=await fetchJSON(url);return (data.foods||[]).map(parseUsda).filter(Boolean);}
async function lookupBarcode(code){
  if(barcache[code]){openPortion({...barcache[code]});return;}   // instant repeat scans
  toast('Looking up…');
  const [o,u]=await Promise.allSettled([offBarcode(code),usdaOn()?usdaBarcode(code):Promise.resolve(null)]);
  const f=(o.status==='fulfilled'&&o.value)||(u.status==='fulfilled'&&u.value)||null;
  if(!f){offerLabelScan(code);return;}
  barcache[code]=f;LS.set('ct_barcache',barcache);openPortion(f);}
async function offBarcode(code){try{
  const url='https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+
    '.json?fields=product_name,brands,nutriments,serving_quantity,serving_size,code';
  const data=await fetchJSON(url);if(data.status!==1||!data.product)return null;return parseProduct(data.product);
  }catch(e){return null;}}
async function usdaBarcode(code){try{
  const url='https://api.nal.usda.gov/fdc/v1/foods/search?api_key='+USDA_KEY+'&query='+encodeURIComponent(code)+'&dataType=Branded&pageSize=5';
  const data=await fetchJSON(url);const strip=s=>String(s||'').replace(/^0+/,'');
  const hit=(data.foods||[]).find(x=>strip(x.gtinUpc)===strip(code))||(data.foods||[])[0];
  return hit?parseUsda(hit):null;}catch(e){return null;}}
function round1(v){return v==null||isNaN(v)?0:+(+v).toFixed(1);}
function parseProduct(p){if(!p)return null;const n=p.nutriments||{};
  const cal=n['energy-kcal_100g']??(n['energy_100g']?n['energy_100g']/4.184:null);if(cal==null)return null;
  return{name:(p.product_name||'Unknown food').trim(),brand:(p.brands||'').split(',')[0].trim(),
    cal:Math.round(cal),p:round1(n['proteins_100g']),c:round1(n['carbohydrates_100g']),f:round1(n['fat_100g']),
    servingG:parseServing(p),code:p.code||''};}
function parseServing(p){if(p.serving_quantity&&!isNaN(p.serving_quantity))return Math.round(+p.serving_quantity);
  if(p.serving_size){const m=String(p.serving_size).match(/([\d.]+)\s*g/);if(m)return Math.round(+m[1]);}return null;}
function usdaNut(arr,num){const n=(arr||[]).find(x=>String(x.nutrientNumber)===num);return n!=null&&n.value!=null?+n.value:null;}
function parseUsda(fd){if(!fd)return null;const ns=fd.foodNutrients||[];
  let cal=usdaNut(ns,'208');if(cal==null)cal=usdaNut(ns,'957');if(cal==null)return null;
  const g=(fd.servingSizeUnit&&String(fd.servingSizeUnit).toLowerCase()==='g'&&fd.servingSize)?Math.round(fd.servingSize):null;
  return{name:(fd.description||'Unknown food').trim(),brand:(fd.brandName||fd.brandOwner||'').split(',')[0].trim(),
    cal:Math.round(cal),p:round1(usdaNut(ns,'203')),c:round1(usdaNut(ns,'205')),f:round1(usdaNut(ns,'204')),servingG:g,code:fd.gtinUpc||''};}

function onLabelPhoto(ev){

  reader.onload=()=>{const b64=String(reader.result).split(',')[1];readLabel(b64,file.type||'image/jpeg');};

async function readLabel(b64,mime){
  const key=LS.get('ct_gemini','');if(!key){toast('Add a Gemini API key in Settings');return;}
  closeModal();toast('Reading label…');
  const prompt=`You are reading a packaged-food Nutrition Facts label from a photo. Respond with ONLY a JSON object, no markdown, with these exact keys:
{"name": string, "brand": string, "serving_text": string, "serving_g": number, "cal": number, "protein": number, "carbs": number, "fat": number}
Rules:
- name: the food/product name if visible, else "".
- brand: brand name if visible, else "".
- serving_text: the serving size exactly as written in household terms, e.g. "2/3 cup", "1 cup", "2 cookies", "1 bottle", "8 fl oz". "" if none.
- serving_g: the serving size in GRAMS. Many US labels print it in parentheses after the household measure, e.g. "2/3 cup (55g)" -> 55, or "Serving size 30g" -> 30. Look carefully inside parentheses. If NO gram weight is printed anywhere (only mL, cups, pieces, fl oz), use 0.
- cal, protein, carbs, fat: amounts PER SERVING exactly as printed. cal in kcal; macros in grams.
- If a value is not legible, use 0. Do not invent values.`;
  const url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+encodeURIComponent(key);
  try{
    const body={contents:[{parts:[{text:prompt},{inline_data:{mime_type:mime,data:b64}}]}],
      generationConfig:{temperature:0,response_mime_type:'application/json'}};
    const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),20000);
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok){toast(r.status===400||r.status===403?'Gemini key rejected — check Settings':'Label read failed ('+r.status+')');return;}
    const data=await r.json();
    const txt=data&&data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text||'';
    let g;try{g=JSON.parse(txt);}catch(e){const m=txt.match(/\{[\s\S]*\}/);g=m?JSON.parse(m[0]):null;}
    if(!g||(!(+g.cal)&&!(+g.protein)&&!(+g.carbs)&&!(+g.fat))){toast('Couldn’t read the label — try again or add manually');return;}
    openLabelReview(g);
  }catch(e){toast(e.name==='AbortError'?'Label read timed out':'Label read failed');}
}

    <div class="row"><label>Calories</label><input id="lbCal" type="number" inputmode="decimal" value="${(+g.cal)||''}" placeholder="per serving"></div>

function saveLabelFood(){
  const name=document.getElementById('lbName').value.trim();
  const brand=document.getElementById('lbBrand').value.trim();
  const sl=document.getElementById('lbServText').value.trim();
  const servRaw=parseFloat(document.getElementById('lbServ').value);
  const cal=parseFloat(document.getElementById('lbCal').value)||0;
  const p=parseFloat(document.getElementById('lbP').value)||0;
  const c=parseFloat(document.getElementById('lbC').value)||0;
  const f=parseFloat(document.getElementById('lbF').value)||0;
  if(!name){toast('Enter a name');return;}
  if(cal<=0){toast('Enter calories');return;}
  let food;
  if(servRaw>0){
    // Gram weight known → store per-100g, keep household label as annotation.
    const r=100/servRaw;
    food={name,brand,cal:Math.round(cal*r),p:+(p*r).toFixed(1),c:+(c*r).toFixed(1),f:+(f*r).toFixed(1),
      servingG:Math.round(servRaw),sl:sl||'',code:pendingLabelCode};
  }else{
    // No gram weight → per-serving food. Macros are stored per serving; ps flag logs by serving count.
    food={name,brand,cal:Math.round(cal),p:+p.toFixed(1),c:+c.toFixed(1),f:+f.toFixed(1),
      servingG:100,sl:sl||'serving',ps:true,code:pendingLabelCode};
  }
  if(pendingLabelCode){barcache[pendingLabelCode]=food;LS.set('ct_barcache',barcache);}
  const proj={name:food.name,brand:food.brand,cal:food.cal,p:food.p,c:food.c,f:food.f,servingG:food.servingG,sl:food.sl,ps:food.ps};
  if(!saved.some(s=>fkey(s)===fkey(food)))saved.unshift(proj);
  saveAll();
  toast(pendingLabelCode?'Saved — future scans are instant':'Saved');
  pendingLabelCode='';
  openPortion({...food});
}

function scanConfig(){

    formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.UPC_EAN_EXTENSION,Html5QrcodeSupportedFormats.CODE_128]};
}
function afterScanStart(){
  try{const t=scanTrack();const caps=t&&t.getCapabilities?t.getCapabilities():null;
    if(caps&&'torch'in caps&&caps.torch)document.getElementById('torchBtn').style.display='';}catch(e){}
}
function openScanner(){
  torchOn=false;
  const tb=document.getElementById('torchBtn');tb.style.display='none';tb.classList.remove('on');
  showSheet('scanScrim','scanModal');
  startScan(true);
}
// Try a high-res rear camera first; if the device rejects those constraints
// (e.g. Safari is picky), fall back to the plain environment camera that always works.
function startScan(hires){
  qr=new Html5Qrcode('reader');
  const cam=hires?{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}
                 :{facingMode:'environment'};
  qr.start(cam,scanConfig(),onScan,()=>{})
    .then(afterScanStart)
    .catch(()=>{ try{qr.clear();}catch(e){} qr=null;
      if(hires){startScan(false);}
      else{toast('Camera unavailable. Allow camera access.');closeScanner();} });
}
function toggleTorch(){const t=scanTrack();if(!t){toast('Torch not available');return;}
  const next=!torchOn;
  t.applyConstraints({advanced:[{torch:next}]})
    .then(()=>{torchOn=next;document.getElementById('torchBtn').classList.toggle('on',torchOn);})
    .catch(()=>toast('Torch not available'));}
function onScan(text){const now=Date.now();if(now-lastScan<2500)return;lastScan=now;
  if(navigator.vibrate)navigator.vibrate(60);closeScanner();lookupBarcode(text.replace(/\D/g,''));}
function closeScanner(){hideSheet('scanScrim','scanModal');torchOn=false;
  if(qr){qr.stop().then(()=>{qr.clear();qr=null;}).catch(()=>{qr=null;});}}

/* ===== Utils ===== */
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let toastT=null;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ===== Init ===== */
const APP_VERSION='v3.4 · 2026-06-28';
renderVer();
// Reliable iOS auto-update: check version.json on launch; if newer, reload fresh.
(async function checkForUpdate(){
  try{
    const r=await fetch('version.json?cb='+Date.now(),{cache:'no-store'});
    const d=await r.json();
    if(d&&d.v&&d.v!==APP_VERSION){
      const u=new URLSearchParams(location.search);
      if(u.get('u')!==d.v){ location.replace(location.pathname+'?u='+encodeURIComponent(d.v)); }
    }
  }catch(e){}
})();
normalizeGoals();
refresh();
enableDrag('addSheet',closeAdd);
enableDrag('modal',closeModal);
enableDrag('scanModal',closeScanner);
// Auto-update: service worker checks the network for a fresh version each launch.
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
backupNow(true);  // auto-backup on open if cloud sync is set up
</script>
