<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Snacc">
<meta name="theme-color" content="#0e1014">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<title>Snacc</title>
<style>
  :root{
    --bg:#0e1014; --bg2:#161922; --card:#1b1f29; --card2:#262b38; --line:#2c323f;
    --text:#f2f4f8; --muted:#929bab; --accent:#4ade80; --accent2:#22c55e;
    --teal:#2dd4bf; --blue:#5b9dff; --amber:#fbbf24; --warn:#f87171;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  body{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:120px;position:relative}
  h1,h2,h3{margin:0;font-weight:700}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}
  .spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--card2);
    border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading{text-align:center;color:var(--muted);padding:22px;font-size:14px}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 16px;line-height:1.6}

  /* ===== Header / dashboard ===== */
  header{padding:calc(env(safe-area-inset-top) + 18px) 18px 18px;
    background:radial-gradient(120% 90% at 50% -10%, rgba(34,197,94,.18), rgba(34,197,94,0) 60%)}
  .date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .logo{width:30px;height:30px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;color:#04140a;font-weight:800;font-size:18px}
  .brand h1{font-size:20px;letter-spacing:-.3px}
  .date-nav{display:flex;gap:6px;align-items:center}
  .date-nav button{width:34px;height:34px;border-radius:10px;background:var(--card);
    font-size:17px;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .date-nav .dlabel{font-size:13px;color:var(--muted);min-width:74px;text-align:center;font-weight:600}

  .dash{display:flex;gap:20px;align-items:center}
  .ring{position:relative;width:130px;height:130px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-c .big{font-size:30px;font-weight:800;line-height:1;letter-spacing:-1px}
  .ring-c .sub{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  .macros{flex:1;display:flex;flex-direction:column;gap:13px}
  .macro .mtop{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}
  .macro .mtop .mn{color:var(--muted)}
  .macro .mtop .mv{font-weight:600}
  .macro .bar{height:7px;background:var(--card2);border-radius:6px;overflow:hidden}
  .macro .fill{height:100%;border-radius:6px;width:0%;transition:width .35s ease}
  .goal-edit{font-size:12px;color:var(--accent);background:none;padding:2px 0;align-self:flex-start;font-weight:600}

  /* ===== Meals ===== */
  main{padding:6px 14px 0}
  .meal{margin-bottom:10px;background:var(--card);border-radius:18px;overflow:hidden}
  .meal-head{display:flex;align-items:center;gap:10px;padding:14px 15px 12px}
  .meal-head .micon{font-size:18px}
  .meal-head .mtitle{flex:1;font-size:15.5px;font-weight:700}
  .meal-head .msub{font-size:13px;color:var(--muted);font-weight:600}
  .meal-head .madd{width:30px;height:30px;border-radius:10px;background:var(--card2);
    color:var(--accent);font-size:19px;display:flex;align-items:center;justify-content:center}
  .entries{padding:0 8px 8px}
  .entry{display:flex;align-items:center;gap:12px;padding:11px 8px;border-top:1px solid var(--line)}
  .entry .info{flex:1;min-width:0}
  .entry .en{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .entry .es{font-size:12px;color:var(--muted);margin-top:2px}
  .entry .ec{font-size:14.5px;font-weight:700;white-space:nowrap}
  .entry .ec small{display:block;font-size:10px;color:var(--muted);font-weight:500;text-align:right}
  .entry .del{width:28px;height:28px;border-radius:8px;background:transparent;color:#5d6475;font-size:15px;
    display:flex;align-items:center;justify-content:center}
  .meal-empty{padding:4px 12px 14px;color:#5d6475;font-size:12.5px}

  /* ===== Floating add button ===== */
  .fab{position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 22px);width:62px;height:62px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04140a;font-size:32px;font-weight:300;
    display:flex;align-items:center;justify-content:center;z-index:40;
    box-shadow:0 8px 24px rgba(34,197,94,.45),0 2px 6px rgba(0,0,0,.4);transition:transform .15s}
  .fab:active{transform:translateX(-50%) scale(.92)}

  /* ===== Bottom sheets / modals ===== */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;z-index:51;
    background:var(--bg2);border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.3,.8,.3,1);
    display:flex;flex-direction:column;max-height:90vh}
  .sheet.show{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--card2);margin:10px auto 4px}

  /* Add sheet */
  #addSheet{height:88vh}
  .add-top{padding:6px 16px 12px}
  .add-title{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
    text-align:center;margin-bottom:12px;font-weight:600}
  .add-title b{color:var(--accent)}
  .search-row{display:flex;gap:9px}
  .search-row input{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:13px 14px;color:var(--text);font-size:16px;outline:none}
  .search-row input:focus{border-color:var(--accent)}
  .sq-btn{width:48px;border-radius:13px;background:var(--card2);font-size:20px;display:flex;align-items:center;justify-content:center}
  .sq-btn.scan{color:var(--blue)}
  .add-actions{display:flex;gap:9px;margin-top:10px}
  .add-actions button{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:11px;font-size:13.5px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px}
  .add-results{flex:1;overflow-y:auto;padding:4px 14px 24px;-webkit-overflow-scrolling:touch}
  .sec-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 4px 8px;font-weight:600}
  .fcard{background:var(--card);border-radius:13px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
  .fcard .fi{flex:1;min-width:0}
  .fcard .fn{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fcard .fs{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fcard .fp{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#04140a;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* Portion + form modal */
  .modal{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;z-index:53;
    background:var(--card);border-radius:24px 24px 0 0;transform:translateY(100%);
    transition:transform .28s cubic-bezier(.3,.8,.3,1);padding:8px 20px calc(env(safe-area-inset-bottom) + 22px);max-height:92vh;overflow-y:auto}
  .modal.show{transform:translateY(0)}
  .modal h3{font-size:18px;margin:6px 0 3px}
  .modal .msub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .nutri-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .nbox{background:var(--card2);border-radius:12px;padding:11px 4px;text-align:center}
  .nbox .nv{font-size:17px;font-weight:700}
  .nbox .nl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .row label{font-size:14px;color:var(--muted);width:80px}
  .row input{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:11px;
    padding:12px;color:var(--text);font-size:16px;outline:none;text-align:center}
  .row input.amt{flex:0 0 90px}
  .row select{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:12px;color:var(--text);font-size:15px;outline:none}
  .row .gg{flex:0 0 56px;text-align:right;font-size:14px;font-weight:700;color:var(--accent)}
  .gtot{text-align:center;font-size:13px;font-weight:600;margin:2px 0 16px}
  .seg{display:flex;gap:6px;margin-bottom:18px}
  .seg button{flex:1;background:var(--card2);color:var(--muted);padding:9px 4px;border-radius:11px;font-size:12.5px;font-weight:600}
  .seg button.on{background:var(--accent);color:#04140a}
  .m-actions{display:flex;gap:10px}
  .m-actions button{flex:1;padding:14px;border-radius:13px;font-size:15px;font-weight:700}
  .m-actions .cancel{background:var(--card2);color:var(--muted)}
  .m-actions .save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04140a}
  .m-actions .star{flex:0 0 52px;background:var(--card2);font-size:20px;color:var(--muted)}
  .m-actions .star.on{color:var(--amber)}

  #reader{width:100%;border-radius:14px;overflow:hidden;margin:10px 0}
  .toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);background:var(--card2);
    color:var(--text);padding:12px 20px;border-radius:30px;font-size:14px;z-index:90;opacity:0;
    transition:opacity .25s;pointer-events:none;border:1px solid var(--line);max-width:90%;text-align:center}
  .toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="date-row">
    <div class="brand"><div class="logo">S</div><h1>Snacc</h1></div>
    <div class="date-nav">
      <button onclick="changeDay(-1)">‹</button>
      <span class="dlabel" id="dateLabel" onclick="goToday()">Today</span>
      <button onclick="changeDay(1)">›</button>
    </div>
  </div>
  <div class="dash">
    <div class="ring">
      <svg width="130" height="130">
        <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#2dd4bf"/></linearGradient></defs>
        <circle cx="65" cy="65" r="56" stroke="var(--card2)" stroke-width="13" fill="none"/>
        <circle id="calRing" cx="65" cy="65" r="56" stroke="url(#rg)" stroke-width="13" fill="none"
          stroke-linecap="round" stroke-dasharray="351.9" stroke-dashoffset="351.9"/>
      </svg>
      <div class="ring-c"><div class="big" id="calLeft">0</div><div class="sub" id="calSub">left</div></div>
    </div>
    <div class="macros">
      <div class="macro"><div class="mtop"><span class="mn">Protein</span><span class="mv" id="pTxt">0 / 0g</span></div>
        <div class="bar"><div class="fill" id="pFill" style="background:var(--blue)"></div></div></div>
      <div class="macro"><div class="mtop"><span class="mn">Carbs</span><span class="mv" id="cTxt">0 / 0g</span></div>
        <div class="bar"><div class="fill" id="cFill" style="background:var(--amber)"></div></div></div>
      <div class="macro"><div class="mtop"><span class="mn">Fat</span><span class="mv" id="fTxt">0 / 0g</span></div>
        <div class="bar"><div class="fill" id="fFill" style="background:var(--warn)"></div></div></div>
      <button class="goal-edit" onclick="editGoals()">Edit goals ›</button>
    </div>
  </div>
</header>

<main id="diary"></main>

<button class="fab" onclick="openAdd()">+</button>

<!-- Add sheet -->
<div class="scrim" id="addScrim" onclick="closeAdd()"></div>
<div class="sheet" id="addSheet">
  <div class="grab"></div>
  <div class="add-top">
    <div class="add-title">Add to <b id="addMealLabel">Snacks</b></div>
    <div class="search-row">
      <input id="addSearch" type="search" placeholder="Search a food…" oninput="onSearchInput()" autocomplete="off">
      <button class="sq-btn scan" onclick="openScanner()" title="Scan barcode">▣</button>
    </div>
    <div class="add-actions">
      <button onclick="openCustomForm()">＋ Custom food</button>
      <button onclick="changeAddMeal()">🍽 <span id="addMealBtn">Snacks</span></button>
    </div>
  </div>
  <div class="add-results" id="addResults"></div>
</div>

<!-- Portion / form modal -->
<div class="scrim" id="modalScrim" onclick="closeModal()"></div>
<div class="modal" id="modal"></div>

<!-- Scanner modal -->
<div class="scrim" id="scanScrim" onclick="closeScanner()"></div>
<div class="modal" id="scanModal">
  <div class="grab"></div>
  <h3>Scan barcode</h3>
  <div class="msub">Point your camera at the package barcode</div>
  <div id="reader"></div>
  <div class="m-actions"><button class="cancel" onclick="closeScanner()">Close</button></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
/* ===== Storage ===== */
const LS={ get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))} };
let goals=LS.get('ct_goals',{cal:2000,p:150,c:200,f:65});
let saved=LS.get('ct_saved',[]);
let logs =LS.get('ct_logs',{});
let curDate=todayKey();
let pendingFood=null, selectedMeal='Snacks', addMeal='Snacks';
const MEALS=['Breakfast','Lunch','Dinner','Snacks'];
const MICON={Breakfast:'🍳',Lunch:'🥗',Dinner:'🍝',Snacks:'🍎'};
const reg={results:[],quick:[]};

let LOCAL_FOODS=[];
fetch('foods.json').then(r=>r.json()).then(d=>{
  LOCAL_FOODS=d.map(x=>({name:x.n,brand:'',cal:x.cal,p:x.p,c:x.c,f:x.f,servingG:x.g||null}));
}).catch(()=>{});

function todayKey(){return new Date().toISOString().slice(0,10);}
function saveAll(){LS.set('ct_goals',goals);LS.set('ct_saved',saved);LS.set('ct_logs',logs);}
function calcMacros(f,g){const r=g/100;return{cal:Math.round(f.cal*r),p:+(f.p*r).toFixed(1),c:+(f.c*r).toFixed(1),f:+(f.f*r).toFixed(1)};}
function gG(cal,pct,k){return Math.round((+cal||0)*(+pct||0)/100/k);}  // grams from % of calories (k=kcal/g)
function normalizeGoals(){ if(goals.pPct==null){const cal=goals.cal||2000;
  goals.pPct=Math.round((goals.p||0)*4/cal*100);goals.cPct=Math.round((goals.c||0)*4/cal*100);
  goals.fPct=Math.round((goals.f||0)*9/cal*100);} }
function fkey(f){return (f.name+'|'+(f.brand||'')).toLowerCase().trim();}
function defaultMeal(){const h=new Date().getHours();return h<11?'Breakfast':h<16?'Lunch':h<21?'Dinner':'Snacks';}

/* ===== Dashboard ===== */
function totalsFor(d){const t={cal:0,p:0,c:0,f:0};(logs[d]||[]).forEach(e=>{t.cal+=e.cal;t.p+=e.p;t.c+=e.c;t.f+=e.f;});
  return{cal:Math.round(t.cal),p:Math.round(t.p),c:Math.round(t.c),f:Math.round(t.f)};}
function renderDashboard(){
  const t=totalsFor(curDate), left=goals.cal-t.cal;
  document.getElementById('calLeft').textContent=Math.abs(left);
  document.getElementById('calSub').textContent=left>=0?'left':'over';
  const C=351.9, pct=Math.min(t.cal/(goals.cal||1),1);
  const ring=document.getElementById('calRing');
  ring.style.strokeDashoffset=C*(1-pct);
  ring.style.stroke=left>=0?'url(#rg)':'var(--warn)';
  setMacro(t.p,goals.p,'pTxt','pFill');
  setMacro(t.c,goals.c,'cTxt','cFill');
  setMacro(t.f,goals.f,'fTxt','fFill');
}
function setMacro(v,goal,tid,fid){document.getElementById(tid).textContent=`${v} / ${goal}g`;
  document.getElementById(fid).style.width=Math.min(v/(goal||1)*100,100)+'%';}

/* ===== Date nav ===== */
function fmtDate(k){if(k===todayKey())return'Today';
  const y=new Date();y.setDate(y.getDate()-1);if(k===y.toISOString().slice(0,10))return'Yesterday';
  return new Date(k+'T12:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});}
function changeDay(n){const d=new Date(curDate+'T12:00');d.setDate(d.getDate()+n);curDate=d.toISOString().slice(0,10);refresh();}
function goToday(){curDate=todayKey();refresh();}
function refresh(){document.getElementById('dateLabel').textContent=fmtDate(curDate);renderDashboard();renderDiary();}

/* ===== Diary (meal sections) ===== */
function mealOf(e){return MEALS.includes(e.meal)?e.meal:'Snacks';}
function renderDiary(){
  const entries=logs[curDate]||[];
  let html='';
  MEALS.forEach(meal=>{
    const es=entries.filter(e=>mealOf(e)===meal);
    const sub=Math.round(es.reduce((s,e)=>s+e.cal,0));
    html+=`<div class="meal"><div class="meal-head">
      <span class="micon">${MICON[meal]}</span><span class="mtitle">${meal}</span>
      <span class="msub">${sub} kcal</span>
      <button class="madd" onclick="openAdd('${meal}')">+</button></div>`;
    if(es.length){
      html+='<div class="entries">'+es.map(e=>`
        <div class="entry"><div class="info">
          <div class="en">${esc(e.name)}</div>
          <div class="es">${e.amount} g · ${e.p}p ${e.c}c ${e.f}f</div></div>
          <div class="ec">${e.cal}<small>kcal</small></div>
          <button class="del" onclick="removeEntry('${e.id}')">✕</button></div>`).join('')+'</div>';
    } else {
      html+='<div class="meal-empty">Nothing yet — tap ＋ to add</div>';
    }
    html+='</div>';
  });
  document.getElementById('diary').innerHTML=html;
}
function removeEntry(id){logs[curDate]=(logs[curDate]||[]).filter(e=>e.id!==id);saveAll();refresh();toast('Removed');}

/* ===== Add sheet ===== */
function openAdd(meal){
  addMeal=meal||defaultMeal();
  document.getElementById('addMealLabel').textContent=addMeal;
  document.getElementById('addMealBtn').textContent=addMeal;
  document.getElementById('addSearch').value='';
  renderQuick();
  showSheet('addScrim','addSheet');
  setTimeout(()=>document.getElementById('addSearch').focus(),250);
}
function closeAdd(){hideSheet('addScrim','addSheet');}
function changeAddMeal(){const i=MEALS.indexOf(addMeal);addMeal=MEALS[(i+1)%MEALS.length];
  document.getElementById('addMealLabel').textContent=addMeal;
  document.getElementById('addMealBtn').textContent=addMeal;toast('Adding to '+addMeal);}

function entryBase(e){if(e.b)return e.b;const a=e.amount||100,r=100/a;
  return{cal:Math.round(e.cal*r),p:+(e.p*r).toFixed(1),c:+(e.c*r).toFixed(1),f:+(e.f*r).toFixed(1),g:a};}
function recentFoods(){
  const out=[],seen=new Set();
  Object.keys(logs).sort().reverse().forEach(d=>{
    const es=logs[d]||[];
    for(let i=es.length-1;i>=0;i--){const e=es[i],k=(e.name+'|'+(e.brand||'')).toLowerCase();
      if(seen.has(k))continue;seen.add(k);const b=entryBase(e);
      out.push({name:e.name,brand:e.brand||'',cal:b.cal,p:b.p,c:b.c,f:b.f,servingG:b.g});}
  });
  return out.slice(0,15);
}
function renderQuick(){
  const seen=new Set(),list=[];
  saved.concat(recentFoods()).forEach(f=>{const k=fkey(f);if(!seen.has(k)){seen.add(k);list.push(f);}});
  reg.quick=list;
  const box=document.getElementById('addResults');
  box.innerHTML=list.length
    ? '<div class="sec-label">Saved & recent</div>'+list.map((f,i)=>fcard(f,i,'quick')).join('')
    : '<div class="empty">Search a food, scan a barcode,<br>or add a custom food.</div>';
}
function fcard(f,i,which){const m=calcMacros(f,100);
  return `<div class="fcard" onclick="pick('${which}',${i})"><div class="fi">
    <div class="fn">${esc(f.name)}</div>
    <div class="fs">${f.brand?esc(f.brand)+' · ':''}${m.cal} kcal / 100g</div></div>
    <div class="fp">+</div></div>`;}
function pick(which,i){openPortion({...reg[which][i]});}

/* ===== Search ===== */
let searchSeq=0, searchTimer=null;
function localSearch(q){const t=q.toLowerCase();
  const hits=saved.concat(LOCAL_FOODS).filter(f=>f.name.toLowerCase().includes(t));
  hits.sort((a,b)=>{const aw=a.name.toLowerCase().startsWith(t)?0:1,bw=b.name.toLowerCase().startsWith(t)?0:1;
    return aw-bw||a.name.length-b.name.length;});
  return hits.slice(0,40);}
function onSearchInput(){
  const q=document.getElementById('addSearch').value.trim();
  if(!q){clearTimeout(searchTimer);renderQuick();return;}
  runSearch(q);
}
function runSearch(q){
  const mySeq=++searchSeq, seen=new Set(), acc=[], box=document.getElementById('addResults');
  function add(list){(list||[]).forEach(f=>{const k=fkey(f);if(!seen.has(k)){seen.add(k);acc.push(f);}});reg.results=acc;}
  function render(pending){
    let html=acc.length?acc.map((f,i)=>fcard(f,i,'results')).join(''):'';
    if(pending) html=acc.length?html+'<div class="loading"><span class="spinner"></span> more…</div>':'<div class="loading"><span class="spinner"></span></div>';
    else if(!acc.length) html='<div class="empty">No matches.<br>Tap “＋ Custom food” to add it.</div>';
    box.innerHTML=html;
  }
  add(localSearch(q)); render(true);
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    usdaSearch(q).then(l=>{if(mySeq!==searchSeq)return;add(l);}).catch(()=>{})
      .finally(()=>{if(mySeq===searchSeq)render(false);});
  },400);
}

/* ===== Portion modal ===== */
function openPortion(food){
  pendingFood=food; selectedMeal=addMeal;
  const hasServ=!!food.servingG;
  const amt=hasServ?1:100;
  const isSaved=saved.some(s=>fkey(s)===fkey(food));
  document.getElementById('modal').innerHTML=`
    <div class="grab"></div>
    <h3>${esc(food.name)}</h3>
    <div class="msub">${food.brand?esc(food.brand)+' · ':''}${food.cal} kcal per 100g</div>
    <div class="nutri-grid">
      <div class="nbox"><div class="nv" id="mCal">0</div><div class="nl">kcal</div></div>
      <div class="nbox"><div class="nv" id="mP">0</div><div class="nl">protein</div></div>
      <div class="nbox"><div class="nv" id="mC">0</div><div class="nl">carbs</div></div>
      <div class="nbox"><div class="nv" id="mF">0</div><div class="nl">fat</div></div></div>
    <div class="row">
      <input class="amt" id="amtInput" type="number" inputmode="decimal" value="${amt}" min="1" oninput="updMacros()">
      <select id="unitSel" onchange="onUnit()">
        ${hasServ?`<option value="serv">serving (${food.servingG} g)</option>`:''}
        <option value="g">grams</option>
      </select></div>
    <div class="seg" id="mealSeg">${MEALS.map(m=>`<button class="${m===selectedMeal?'on':''}" onclick="setMeal('${m}')">${m}</button>`).join('')}</div>
    <div class="m-actions">
      <button class="star ${isSaved?'on':''}" id="starBtn" onclick="toggleSave()">★</button>
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="confirmAdd()">Add</button></div>`;
  updMacros();
  showSheet('modalScrim','modal');
}
function curGrams(){const v=parseFloat(document.getElementById('amtInput').value)||0;
  return document.getElementById('unitSel').value==='serv'?v*(pendingFood.servingG||100):v;}
function updMacros(){const m=calcMacros(pendingFood,curGrams());
  document.getElementById('mCal').textContent=m.cal;document.getElementById('mP').textContent=m.p;
  document.getElementById('mC').textContent=m.c;document.getElementById('mF').textContent=m.f;}
function onUnit(){document.getElementById('amtInput').value=document.getElementById('unitSel').value==='serv'?1:(pendingFood.servingG||100);updMacros();}
function setMeal(m){selectedMeal=m;[...document.querySelectorAll('#mealSeg button')].forEach(b=>b.classList.toggle('on',b.textContent===m));}
function confirmAdd(){
  const g=curGrams();if(g<=0){toast('Enter an amount');return;}
  const m=calcMacros(pendingFood,g);
  const entry={id:Date.now()+''+Math.random().toString(36).slice(2,6),name:pendingFood.name,brand:pendingFood.brand||'',
    meal:selectedMeal,amount:Math.round(g),cal:m.cal,p:m.p,c:m.c,f:m.f,
    b:{cal:pendingFood.cal,p:pendingFood.p,c:pendingFood.c,f:pendingFood.f,g:pendingFood.servingG||100}};
  (logs[curDate]=logs[curDate]||[]).push(entry);saveAll();
  closeModal();closeAdd();refresh();toast('Added to '+selectedMeal);
}
function toggleSave(){const f=pendingFood,i=saved.findIndex(s=>fkey(s)===fkey(f)),btn=document.getElementById('starBtn');
  if(i>=0){saved.splice(i,1);btn.classList.remove('on');toast('Unsaved');}
  else{saved.unshift({name:f.name,brand:f.brand||'',cal:f.cal,p:f.p,c:f.c,f:f.f,servingG:f.servingG||null});btn.classList.add('on');toast('Saved');}
  saveAll();}
function closeModal(){hideSheet('modalScrim','modal');pendingFood=null;}

/* ===== Custom food ===== */
function openCustomForm(){
  const pre=(document.getElementById('addSearch').value||'').trim();
  document.getElementById('modal').innerHTML=`
    <div class="grab"></div>
    <h3>Custom food</h3>
    <div class="msub">Enter nutrition for one serving — it saves & becomes searchable.</div>
    <div class="row"><label>Name</label><input id="cfName" type="text" value="${esc(pre)}" placeholder="e.g. Mom's chili" style="text-align:left"></div>
    <div class="row"><label>Serving g</label><input id="cfServ" type="number" inputmode="decimal" value="100"></div>
    <div class="row"><label>Calories</label><input id="cfCal" type="number" inputmode="decimal" placeholder="per serving"></div>
    <div class="row"><label>Protein g</label><input id="cfP" type="number" inputmode="decimal" placeholder="per serving"></div>
    <div class="row"><label>Carbs g</label><input id="cfC" type="number" inputmode="decimal" placeholder="per serving"></div>
    <div class="row"><label>Fat g</label><input id="cfF" type="number" inputmode="decimal" placeholder="per serving"></div>
    <div class="m-actions"><button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="saveCustomFood()">Save</button></div>`;
  showSheet('modalScrim','modal');
}
function saveCustomFood(){
  const name=document.getElementById('cfName').value.trim();
  const serv=parseFloat(document.getElementById('cfServ').value)||100;
  const cal=parseFloat(document.getElementById('cfCal').value)||0;
  const p=parseFloat(document.getElementById('cfP').value)||0;
  const c=parseFloat(document.getElementById('cfC').value)||0;
  const f=parseFloat(document.getElementById('cfF').value)||0;
  if(!name){toast('Enter a name');return;}
  if(cal<=0){toast('Enter calories');return;}
  const r=100/serv;
  const food={name,brand:'',cal:Math.round(cal*r),p:+(p*r).toFixed(1),c:+(c*r).toFixed(1),f:+(f*r).toFixed(1),servingG:Math.round(serv)};
  saved.unshift(food);saveAll();toast('Custom food saved');
  openPortion({...food});
}

/* ===== Goals ===== */
function editGoals(){
  document.getElementById('modal').innerHTML=`
    <div class="grab"></div>
    <h3>Daily goals</h3><div class="msub">Set total calories, then the % of calories for each macro — grams calculate automatically.</div>
    <div class="row"><label>Calories</label><input id="gCal" type="number" inputmode="numeric" value="${goals.cal}" oninput="updGoal()"></div>
    <div class="row"><label>Protein %</label><input id="gPp" type="number" inputmode="numeric" value="${goals.pPct}" oninput="updGoal()"><span class="gg" id="ggP">0 g</span></div>
    <div class="row"><label>Carbs %</label><input id="gCp" type="number" inputmode="numeric" value="${goals.cPct}" oninput="updGoal()"><span class="gg" id="ggC">0 g</span></div>
    <div class="row"><label>Fat %</label><input id="gFp" type="number" inputmode="numeric" value="${goals.fPct}" oninput="updGoal()"><span class="gg" id="ggF">0 g</span></div>
    <div class="gtot" id="gTot"></div>
    <div class="m-actions"><button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="save" onclick="saveGoals()">Save</button></div>`;
  showSheet('modalScrim','modal'); updGoal();
}
function updGoal(){
  const cal=+document.getElementById('gCal').value||0;
  const pp=+document.getElementById('gPp').value||0,cp=+document.getElementById('gCp').value||0,fp=+document.getElementById('gFp').value||0;
  document.getElementById('ggP').textContent=gG(cal,pp,4)+' g';
  document.getElementById('ggC').textContent=gG(cal,cp,4)+' g';
  document.getElementById('ggF').textContent=gG(cal,fp,9)+' g';
  const tot=pp+cp+fp, el=document.getElementById('gTot');
  el.textContent='Macros total '+tot+'%'+(tot===100?'  ✓':'  · aim for 100%');
  el.style.color=tot===100?'var(--accent)':'var(--muted)';
}
function saveGoals(){
  const cal=+document.getElementById('gCal').value||2000;
  const pPct=+document.getElementById('gPp').value||0,cPct=+document.getElementById('gCp').value||0,fPct=+document.getElementById('gFp').value||0;
  goals={cal,pPct,cPct,fPct,p:gG(cal,pPct,4),c:gG(cal,cPct,4),f:gG(cal,fPct,9)};
  saveAll();closeModal();renderDashboard();toast('Goals updated');
}

/* ===== Sheet helpers ===== */
function showSheet(scrim,sheet){document.getElementById(scrim).classList.add('show');document.getElementById(sheet).classList.add('show');}
function hideSheet(scrim,sheet){document.getElementById(scrim).classList.remove('show');document.getElementById(sheet).classList.remove('show');}

/* ===== Food databases (barcode + USDA) ===== */
const USDA_KEY='atacxlsNjojlOrTwquGwRvyOcrhRk1MtqLKwvfRa';
function usdaOn(){return USDA_KEY&&USDA_KEY!=='REPLACE_WITH_USDA_KEY';}
async function fetchJSON(url,ms=8000){const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(url,{signal:ctrl.signal});return await r.json();}finally{clearTimeout(t);}}
async function usdaSearch(q){if(!usdaOn())return[];
  const url='https://api.nal.usda.gov/fdc/v1/foods/search?api_key='+USDA_KEY+'&query='+encodeURIComponent(q)+
    '&pageSize=20&dataType=Branded,Foundation,SR%20Legacy,Survey%20(FNDDS)';
  const data=await fetchJSON(url);return (data.foods||[]).map(parseUsda).filter(Boolean);}
async function lookupBarcode(code){toast('Looking up '+code+'…');
  let f=await offBarcode(code);if(!f&&usdaOn())f=await usdaBarcode(code);
  if(!f){toast('Product not found in either database');return;}openPortion(f);}
async function offBarcode(code){try{
  const url='https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+
    '.json?fields=product_name,brands,nutriments,serving_quantity,serving_size,code';
  const data=await fetchJSON(url);if(data.status!==1||!data.product)return null;return parseProduct(data.product);
  }catch(e){return null;}}
async function usdaBarcode(code){try{
  const url='https://api.nal.usda.gov/fdc/v1/foods/search?api_key='+USDA_KEY+'&query='+encodeURIComponent(code)+'&dataType=Branded&pageSize=5';
  const data=await fetchJSON(url);const strip=s=>String(s||'').replace(/^0+/,'');
  const hit=(data.foods||[]).find(x=>strip(x.gtinUpc)===strip(code))||(data.foods||[])[0];
  return hit?parseUsda(hit):null;}catch(e){return null;}}
function round1(v){return v==null||isNaN(v)?0:+(+v).toFixed(1);}
function parseProduct(p){if(!p)return null;const n=p.nutriments||{};
  const cal=n['energy-kcal_100g']??(n['energy_100g']?n['energy_100g']/4.184:null);if(cal==null)return null;
  return{name:(p.product_name||'Unknown food').trim(),brand:(p.brands||'').split(',')[0].trim(),
    cal:Math.round(cal),p:round1(n['proteins_100g']),c:round1(n['carbohydrates_100g']),f:round1(n['fat_100g']),
    servingG:parseServing(p),code:p.code||''};}
function parseServing(p){if(p.serving_quantity&&!isNaN(p.serving_quantity))return Math.round(+p.serving_quantity);
  if(p.serving_size){const m=String(p.serving_size).match(/([\d.]+)\s*g/);if(m)return Math.round(+m[1]);}return null;}
function usdaNut(arr,num){const n=(arr||[]).find(x=>String(x.nutrientNumber)===num);return n!=null&&n.value!=null?+n.value:null;}
function parseUsda(fd){if(!fd)return null;const ns=fd.foodNutrients||[];
  let cal=usdaNut(ns,'208');if(cal==null)cal=usdaNut(ns,'957');if(cal==null)return null;
  const g=(fd.servingSizeUnit&&String(fd.servingSizeUnit).toLowerCase()==='g'&&fd.servingSize)?Math.round(fd.servingSize):null;
  return{name:(fd.description||'Unknown food').trim(),brand:(fd.brandName||fd.brandOwner||'').split(',')[0].trim(),
    cal:Math.round(cal),p:round1(usdaNut(ns,'203')),c:round1(usdaNut(ns,'205')),f:round1(usdaNut(ns,'204')),servingG:g,code:fd.gtinUpc||''};}

/* ===== Scanner ===== */
let qr=null,lastScan=0;
function openScanner(){
  showSheet('scanScrim','scanModal');
  qr=new Html5Qrcode('reader');
  const cfg={fps:10,qrbox:{width:250,height:160},formatsToSupport:[
    Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128]};
  qr.start({facingMode:'environment'},cfg,onScan,()=>{}).catch(()=>{toast('Camera unavailable. Allow camera access.');closeScanner();});
}
function onScan(text){const now=Date.now();if(now-lastScan<2500)return;lastScan=now;
  if(navigator.vibrate)navigator.vibrate(60);closeScanner();lookupBarcode(text.replace(/\D/g,''));}
function closeScanner(){hideSheet('scanScrim','scanModal');if(qr){qr.stop().then(()=>{qr.clear();qr=null;}).catch(()=>{qr=null;});}}

/* ===== Utils ===== */
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let toastT=null;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ===== Init ===== */
normalizeGoals();
refresh();
</script>
